<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HIIT Timer Pro</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0a0a;
                --surface: #141414;
                --border: #2a2a2a;
                --text: #f0f0f0;
                --muted: #666;
                --prepare: #f59e0b;
                --work: #22c55e;
                --rest: #3b82f6;
                --warning: #ef4444;
                --btn-primary: #f0f0f0;
                --btn-primary-text: #0a0a0a;
                --radius: 12px;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
            }

            /* ── SETUP SCREEN ── */
            #setup-screen {
                flex: 1;
                display: flex;
                flex-direction: column;
                gap: 0;
                max-width: 520px;
                width: 100%;
                margin: 0 auto;
                padding: 24px 16px 32px;
            }

            #setup-screen h1 {
                font-size: clamp(1.6rem, 5vw, 2.2rem);
                font-weight: 800;
                letter-spacing: -0.03em;
                margin-bottom: 24px;
            }

            .config-grid {
                display: grid;
                gap: 12px;
                margin-bottom: 12px;
            }

            .config-row {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 14px 16px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                transition:
                    opacity 0.2s ease,
                    max-height 0.2s ease,
                    padding 0.2s ease,
                    margin 0.2s ease;
            }

            .config-row.hidden {
                opacity: 0;
                max-height: 0;
                padding-top: 0;
                padding-bottom: 0;
                margin: 0;
                border: none;
                overflow: hidden;
                pointer-events: none;
            }

            .config-row label {
                font-size: 0.9rem;
                color: var(--muted);
                flex: 1;
                line-height: 1.3;
            }

            .config-row .label-main {
                display: block;
                font-size: 1rem;
                color: var(--text);
                font-weight: 600;
            }

            .stepper input[type="text"],
            .stepper input[type="number"] {
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                color: var(--text);
                font-size: 1.1rem;
                font-weight: 700;
                width: 80px;
                text-align: center;
                padding: 8px 6px;
                -moz-appearance: textfield;
                appearance: textfield;
            }

            .stepper input[type="number"]::-webkit-inner-spin-button,
            .stepper input[type="number"]::-webkit-outer-spin-button {
                display: none;
            }

            .stepper input:focus {
                outline: 2px solid var(--btn-primary);
                outline-offset: 2px;
            }

            .stepper {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .stepper button {
                background: var(--border);
                border: none;
                border-radius: 6px;
                color: var(--text);
                font-size: 1.2rem;
                width: 32px;
                height: 32px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }

            .stepper button:hover {
                background: #3a3a3a;
            }
            .stepper button:active {
                background: #4a4a4a;
            }

            /* ── TOGGLE ADVANCED ROW ── */
            .toggle-row {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                margin-bottom: 12px;
                cursor: pointer;
            }

            .toggle-label-wrap {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 16px;
                width: 100%;
                cursor: pointer;
                user-select: none;
            }

            .toggle-label-wrap span {
                font-size: 1rem;
                font-weight: 600;
                color: var(--text);
            }

            .switch {
                position: relative;
                display: inline-block;
                width: 50px;
                height: 26px;
                pointer-events: none;
            }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                inset: 0;
                background-color: var(--border);
                transition: 0.3s;
                border-radius: 34px;
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 18px;
                width: 18px;
                left: 4px;
                bottom: 4px;
                background-color: var(--muted);
                transition: 0.3s;
                border-radius: 50%;
            }

            input:checked + .slider {
                background-color: var(--work);
            }
            input:checked + .slider:before {
                transform: translateX(24px);
                background-color: #000;
            }

            /* ── LISTA DINAMICA ROUND ── */
            .rounds-list-container {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                margin-bottom: 24px;
                display: none;
            }

            .rounds-list-container.visible {
                display: block;
            }

            .rounds-list-container h3 {
                font-size: 1rem;
                font-weight: 700;
                margin-bottom: 12px;
                color: var(--text);
            }

            .rounds-list {
                display: grid;
                gap: 8px;
                max-height: 200px;
                overflow-y: auto;
                padding-right: 4px;
            }

            .round-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: var(--bg);
                border: 1px solid var(--border);
                padding: 8px 12px;
                border-radius: 8px;
            }

            .round-item span {
                font-size: 0.9rem;
                font-weight: 600;
            }

            /* summary card */
            .summary-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 24px;
            }

            .summary-stat {
                text-align: center;
            }
            .summary-stat .val {
                font-size: clamp(1.8rem, 6vw, 2.4rem);
                font-weight: 900;
                letter-spacing: -0.04em;
                line-height: 1;
            }
            .summary-stat .lbl {
                font-size: 0.75rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                margin-top: 4px;
            }

            .start-btn {
                background: var(--btn-primary);
                color: var(--btn-primary-text);
                border: none;
                border-radius: var(--radius);
                font-size: 1.1rem;
                font-weight: 800;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                padding: 18px;
                width: 100%;
                cursor: pointer;
                transition: opacity 0.15s;
            }

            .start-btn:hover {
                opacity: 0.9;
            }
            .start-btn:active {
                opacity: 0.75;
            }

            /* ── ACTIVE SCREEN ── */
            #active-screen {
                display: none;
                flex: 1;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                gap: 24px;
                padding: 24px 48px 40px;
                max-width: 1100px;
                width: 100%;
                margin: 0 auto;
            }

            #active-screen.visible {
                display: flex;
            }

            .phase-badge {
                font-size: 0.8rem;
                font-weight: 800;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                padding: 6px 16px;
                border-radius: 99px;
                background: var(--surface);
                color: var(--muted);
                transition:
                    background 0.3s,
                    color 0.3s;
            }

            .phase-badge.prepare {
                background: var(--prepare);
                color: #000;
            }
            .phase-badge.work {
                background: var(--work);
                color: #000;
            }
            .phase-badge.rest {
                background: var(--rest);
                color: #fff;
            }
            .phase-badge.warning {
                background: var(--warning);
                color: #fff;
            }

            .main-display {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: clamp(12px, 4vw, 32px);
                width: 100%;
                flex: 1;
            }

            .round-display {
                text-align: center;
                flex: 1;
            }

            .display-divider {
                font-size: clamp(4rem, 10vw, 12rem);
                font-weight: 200;
                color: var(--border);
                line-height: 1;
                padding-bottom: 0.1em;
                flex-shrink: 0;
            }

            .round-display .round-num {
                font-size: clamp(6rem, 18vw, 16rem);
                font-weight: 900;
                line-height: 1;
                letter-spacing: -0.05em;
                transition: color 0.3s;
            }

            .round-display .round-label {
                font-size: 0.8rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-top: 4px;
            }

            .timer-display {
                text-align: center;
                flex: 1;
            }

            .timer-display .time-val {
                font-size: clamp(6rem, 18vw, 16rem);
                font-weight: 900;
                font-variant-numeric: tabular-nums;
                letter-spacing: -0.04em;
                line-height: 1;
                transition: color 0.3s;
            }

            .timer-display .time-label {
                font-size: 0.8rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-top: 4px;
            }

            /* progress bar */
            .progress-wrap {
                width: 100%;
                height: 6px;
                background: var(--border);
                border-radius: 99px;
                overflow: hidden;
                margin-top: 12px;
            }

            .progress-bar {
                height: 100%;
                border-radius: 99px;
                background: var(--phase-color, var(--work));
                transition:
                    width 0.5s linear,
                    background 0.3s;
                width: 100%;
            }

            /* controls */
            .controls {
                display: flex;
                gap: 12px;
                width: 100%;
                margin-top: auto;
            }

            .ctrl-btn {
                flex: 1;
                border: none;
                border-radius: var(--radius);
                font-size: 1rem;
                font-weight: 700;
                padding: 16px;
                cursor: pointer;
                transition: opacity 0.15s;
            }

            .ctrl-btn:hover {
                opacity: 0.85;
            }
            .ctrl-btn:active {
                opacity: 0.65;
            }

            #btn-pause {
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text);
            }

            #btn-stop {
                background: #1a0000;
                border: 1px solid #3a0000;
                color: var(--warning);
            }

            /* finished overlay */
            #finished-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.92);
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
                z-index: 100;
            }

            #finished-overlay.visible {
                display: flex;
            }

            #finished-overlay h2 {
                font-size: clamp(2rem, 8vw, 3.5rem);
                font-weight: 900;
                letter-spacing: -0.03em;
            }

            #finished-overlay p {
                color: var(--muted);
                font-size: 1rem;
            }

            #btn-done {
                background: var(--btn-primary);
                color: var(--btn-primary-text);
                border: none;
                border-radius: var(--radius);
                font-size: 1rem;
                font-weight: 800;
                padding: 16px 40px;
                cursor: pointer;
                margin-top: 8px;
            }

            /* colour themes per phase */
            body.phase-prepare {
                --phase-color: var(--prepare);
            }
            body.phase-work {
                --phase-color: var(--work);
            }
            body.phase-rest {
                --phase-color: var(--rest);
            }
            body.phase-warning {
                --phase-color: var(--warning);
            }

            .round-display .round-num,
            .timer-display .time-val {
                color: var(--phase-color, var(--text));
            }
        </style>
    </head>
    <body>
        <div id="setup-screen">
            <h1>HIIT Timer Pro</h1>

            <div class="config-grid">
                <div class="config-row">
                    <label>
                        <span class="label-main">Round totali</span>
                        Numero di round totali
                    </label>
                    <div class="stepper">
                        <button id="btn-round-minus">−</button>
                        <input
                            type="number"
                            id="cfg-rounds"
                            min="1"
                            max="30"
                            value="8"
                            readonly
                        />
                        <button id="btn-round-plus">+</button>
                    </div>
                </div>

                <div class="config-row">
                    <label>
                        <span class="label-main">Prepare</span>
                        Conto alla rovescia iniziale
                    </label>
                    <div class="stepper">
                        <button data-field="prepare" data-delta="-5">−</button>
                        <input
                            type="text"
                            id="cfg-prepare"
                            data-value="10"
                            inputmode="numeric"
                        />
                        <button data-field="prepare" data-delta="5">+</button>
                    </div>
                </div>

                <div class="config-row" id="row-standard-work">
                    <label>
                        <span class="label-main">Durata round</span>
                        Tempo di lavoro (uguale per tutti i round)
                    </label>
                    <div class="stepper">
                        <button data-field="work" data-delta="-5">−</button>
                        <input
                            type="text"
                            id="cfg-work"
                            data-value="40"
                            inputmode="numeric"
                        />
                        <button data-field="work" data-delta="5">+</button>
                    </div>
                </div>

                <div class="config-row">
                    <label>
                        <span class="label-main">Warning pre-fine</span>
                        Allarme X secondi prima della fine del round
                    </label>
                    <div class="stepper">
                        <button id="btn-warning-minus">−</button>
                        <input
                            type="number"
                            id="cfg-warning"
                            min="0"
                            max="30"
                            value="5"
                            readonly
                        />
                        <button id="btn-warning-plus">+</button>
                    </div>
                </div>

                <div class="config-row">
                    <label>
                        <span class="label-main">Rest</span>
                        Recupero tra i round
                    </label>
                    <div class="stepper">
                        <button data-field="rest" data-delta="-5">−</button>
                        <input
                            type="text"
                            id="cfg-rest"
                            data-value="20"
                            inputmode="numeric"
                        />
                        <button data-field="rest" data-delta="5">+</button>
                    </div>
                </div>
            </div>

            <div class="toggle-row">
                <label class="toggle-label-wrap" for="cfg-advanced-toggle">
                    <span>Imposta tempi diversi per ogni set</span>
                    <div class="switch">
                        <input type="checkbox" id="cfg-advanced-toggle" />
                        <span class="slider"></span>
                    </div>
                </label>
            </div>

            <div
                class="rounds-list-container"
                id="rounds-inputs-container-wrap"
            >
                <h3>Personalizza durata singoli Set (mm:ss)</h3>
                <div class="rounds-list" id="rounds-inputs-container"></div>
            </div>

            <div class="summary-card">
                <div class="summary-stat">
                    <div class="val" id="sum-rounds">8</div>
                    <div class="lbl">Round</div>
                </div>
                <div class="summary-stat">
                    <div class="val" id="sum-total">—</div>
                    <div class="lbl">Durata totale</div>
                </div>
            </div>

            <button class="start-btn" id="btn-start">▶ Inizia</button>
        </div>

        <div id="active-screen">
            <div class="phase-badge" id="phase-badge">PREPARE</div>

            <div class="main-display">
                <div class="round-display">
                    <div class="round-num" id="round-num">1</div>
                    <div class="round-label" id="round-label">/ 8 round</div>
                </div>
                <div class="display-divider">|</div>
                <div class="timer-display">
                    <div class="time-val" id="time-val">00:10</div>
                    <div class="time-label" id="time-label">tempo</div>
                </div>
            </div>

            <div class="progress-wrap" style="width: 100%">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="btn-pause">⏸ Pausa</button>
                <button class="ctrl-btn" id="btn-stop">■ Stop</button>
            </div>
        </div>

        <div id="finished-overlay">
            <h2>💪 Fatto!</h2>
            <p id="finished-msg">Allenamento completato</p>
            <button id="btn-done">Ricomincia</button>
        </div>

        <script>
            // ── Variabili di Stato Configurazione ──
            let roundTimes = [40, 40, 40, 40, 40, 40, 40, 40];
            const DEFAULTS = { prepare: 10, work: 40, warning: 5, rest: 20 };

            // Converte i secondi nel formato stringa mm:ss
            function formatSecondsToMMSS(totalSeconds) {
                const m = Math.floor(totalSeconds / 60);
                const s = totalSeconds % 60;
                return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
            }

            // ── FUNZIONE DI SANIFICAZIONE AVANZATA ──
            // Accetta testi liberi (es: "40", "1:20", "02:05", "90") e restituisce i secondi puri corretti
            function parseAndSanitizeTimeToSeconds(
                inputStr,
                fallbackValue = 10,
                isWorkField = false,
            ) {
                // Rimuove tutto tranne numeri e i due punti
                let clean = inputStr.replace(/[^0-9:]/g, "").trim();
                if (!clean) return fallbackValue;

                let seconds = 0;
                if (clean.includes(":")) {
                    const parts = clean.split(":");
                    const mins = parseInt(parts[0]) || 0;
                    const secs = parseInt(parts[1]) || 0;
                    seconds = mins * 60 + secs;
                } else {
                    // Se inserisce solo un numero puro (es: "40" o "90")
                    seconds = parseInt(clean) || fallbackValue;
                }

                // Vincoli minimi e massimi di sicurezza
                const minAllowed = isWorkField ? 5 : 0;
                if (seconds < minAllowed) seconds = minAllowed;
                if (seconds > 3600) seconds = 3600; // Massimo 1 ora

                return seconds;
            }

            function loadConfig() {
                const saved = localStorage.getItem("hiit-config-v6");
                if (!saved) {
                    setRawValue("prepare", DEFAULTS.prepare);
                    setRawValue("work", DEFAULTS.work);
                    setRawValue("rest", DEFAULTS.rest);
                    document.getElementById("cfg-warning").value =
                        DEFAULTS.warning;
                    syncRoundsArray(
                        parseInt(document.getElementById("cfg-rounds").value),
                    );
                    return;
                }
                try {
                    const parsed = JSON.parse(saved);
                    setRawValue("prepare", parsed.prepare ?? DEFAULTS.prepare);
                    setRawValue("work", parsed.work ?? DEFAULTS.work);
                    setRawValue("rest", parsed.rest ?? DEFAULTS.rest);
                    document.getElementById("cfg-warning").value =
                        parsed.warning ?? DEFAULTS.warning;
                    document.getElementById("cfg-advanced-toggle").checked =
                        parsed.advancedMode ?? false;

                    if (
                        Array.isArray(parsed.roundTimes) &&
                        parsed.roundTimes.length > 0
                    ) {
                        roundTimes = parsed.roundTimes;
                    }
                } catch (e) {
                    console.error(e);
                }

                toggleAdvancedMode();
            }

            function saveConfig() {
                const cfg = {
                    prepare: getRawValue("prepare"),
                    work: getRawValue("work"),
                    warning:
                        parseInt(
                            document.getElementById("cfg-warning").value,
                        ) || DEFAULTS.warning,
                    rest: getRawValue("rest"),
                    advancedMode: document.getElementById("cfg-advanced-toggle")
                        .checked,
                    roundTimes: roundTimes,
                };
                localStorage.setItem("hiit-config-v6", JSON.stringify(cfg));
            }

            function getRawValue(idPart) {
                return (
                    parseInt(
                        document.getElementById("cfg-" + idPart).dataset.value,
                    ) || 0
                );
            }
            function setRawValue(idPart, seconds) {
                const input = document.getElementById("cfg-" + idPart);
                input.dataset.value = seconds;
                input.value = formatSecondsToMMSS(seconds);
            }

            function syncRoundsArray(targetLength) {
                const currentWorkDefault = getRawValue("work") || DEFAULTS.work;
                while (roundTimes.length < targetLength) {
                    const lastVal =
                        roundTimes[roundTimes.length - 1] || currentWorkDefault;
                    roundTimes.push(lastVal);
                }
                while (roundTimes.length > targetLength) {
                    roundTimes.pop();
                }
            }

            function toggleAdvancedMode() {
                const isAdvanced = document.getElementById(
                    "cfg-advanced-toggle",
                ).checked;
                const rowStandard =
                    document.getElementById("row-standard-work");
                const containerWrap = document.getElementById(
                    "rounds-inputs-container-wrap",
                );
                const totalRounds = roundTimes.length;

                if (isAdvanced) {
                    rowStandard.classList.add("hidden");
                    containerWrap.classList.add("visible");
                } else {
                    rowStandard.classList.remove("hidden");
                    containerWrap.classList.remove("visible");
                    const standardValue = getRawValue("work") || DEFAULTS.work;
                    roundTimes = Array(totalRounds).fill(standardValue);
                }

                buildRoundInputs();
            }

            function buildRoundInputs() {
                document.getElementById("cfg-rounds").value = roundTimes.length;
                const container = document.getElementById(
                    "rounds-inputs-container",
                );
                container.innerHTML = "";

                roundTimes.forEach((time, index) => {
                    const row = document.createElement("div");
                    row.className = "round-item";
                    row.innerHTML = `
      <span>Set ${index + 1}</span>
      <div class="stepper">
        <button type="button" class="btn-time-minus" data-idx="${index}">−</button>
        <input type="text" class="cfg-single-work" data-idx="${index}" value="${formatSecondsToMMSS(time)}" inputmode="numeric" />
        <button type="button" class="btn-time-plus" data-idx="${index}">+</button>
      </div>
    `;
                    container.appendChild(row);
                });

                // Eventi pulsanti dei singoli set
                container.querySelectorAll(".btn-time-minus").forEach((b) => {
                    b.addEventListener("click", () =>
                        modifyRoundTime(parseInt(b.dataset.idx), -5),
                    );
                });
                container.querySelectorAll(".btn-time-plus").forEach((b) => {
                    b.addEventListener("click", () =>
                        modifyRoundTime(parseInt(b.dataset.idx), 5),
                    );
                });

                // Gestione della digitazione manuale sui singoli Set
                container
                    .querySelectorAll(".cfg-single-work")
                    .forEach((input) => {
                        const handleSingleBlur = () => {
                            const idx = parseInt(input.dataset.idx);
                            const sanitizedSec = parseAndSanitizeTimeToSeconds(
                                input.value,
                                DEFAULTS.work,
                                true,
                            );
                            roundTimes[idx] = sanitizedSec;
                            input.value = formatSecondsToMMSS(sanitizedSec);
                            updateSummary();
                        };

                        input.addEventListener("blur", handleSingleBlur);
                        input.addEventListener("keydown", (e) => {
                            if (e.key === "Enter") {
                                input.blur();
                            }
                        });
                    });

                updateSummary();
            }

            function modifyRoundTime(idx, delta) {
                roundTimes[idx] = Math.max(5, (roundTimes[idx] || 40) + delta);
                buildRoundInputs();
            }

            // Gestione manuale e sanificazione sui 3 campi principali (Prepare, Work, Rest)
            ["prepare", "work", "rest"].forEach((field) => {
                const input = document.getElementById("cfg-" + field);

                const handleMainBlur = () => {
                    const def = DEFAULTS[field];
                    const isWork = field === "work";
                    const sanitizedSec = parseAndSanitizeTimeToSeconds(
                        input.value,
                        def,
                        isWork,
                    );
                    setRawValue(field, sanitizedSec);
                    updateSummary();
                };

                input.addEventListener("blur", handleMainBlur);
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        input.blur();
                    }
                });
            });

            // Pulsanti generali + e - per il numero di Round totali
            document
                .getElementById("btn-round-plus")
                .addEventListener("click", () => {
                    let currentRounds = roundTimes.length;
                    if (currentRounds >= 30) return;
                    syncRoundsArray(currentRounds + 1);
                    if (
                        !document.getElementById("cfg-advanced-toggle").checked
                    ) {
                        const standardValue =
                            getRawValue("work") || DEFAULTS.work;
                        roundTimes[roundTimes.length - 1] = standardValue;
                    }
                    buildRoundInputs();
                });

            document
                .getElementById("btn-round-minus")
                .addEventListener("click", () => {
                    let currentRounds = roundTimes.length;
                    if (currentRounds <= 1) return;
                    syncRoundsArray(currentRounds - 1);
                    buildRoundInputs();
                });

            // Pulsanti Warning pre-fine
            document
                .getElementById("btn-warning-plus")
                .addEventListener("click", () => {
                    const input = document.getElementById("cfg-warning");
                    input.value = Math.min(
                        30,
                        (parseInt(input.value) || 0) + 1,
                    );
                    updateSummary();
                });
            document
                .getElementById("btn-warning-minus")
                .addEventListener("click", () => {
                    const input = document.getElementById("cfg-warning");
                    input.value = Math.max(0, (parseInt(input.value) || 0) - 1);
                    updateSummary();
                });

            document
                .getElementById("cfg-advanced-toggle")
                .addEventListener("change", toggleAdvancedMode);

            // Aggiorna il sommario complessivo dell'allenamento
            function updateSummary() {
                const prepare = getRawValue("prepare");
                const rest = getRawValue("rest");
                const totalRounds = roundTimes.length;

                let workTotal = 0;
                if (document.getElementById("cfg-advanced-toggle").checked) {
                    workTotal = roundTimes.reduce((a, b) => a + b, 0);
                } else {
                    const standardValue = getRawValue("work") || DEFAULTS.work;
                    workTotal = totalRounds * standardValue;
                    roundTimes = Array(totalRounds).fill(standardValue);
                }

                const restTotal =
                    totalRounds > 1 ? (totalRounds - 1) * rest : 0;
                const totalDuration = prepare + workTotal + restTotal;

                document.getElementById("sum-rounds").textContent = totalRounds;
                document.getElementById("sum-total").textContent =
                    fmtTime(totalDuration);
                saveConfig();
            }

            function fmtTime(sec) {
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return m > 0 ? `${m}:${String(s).padStart(2, "0")}` : `${s}s`;
            }

            // Eventi pulsanti incremento/decremento dei campi principali
            document.querySelectorAll("[data-field]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const field = btn.dataset.field;
                    const delta = parseInt(btn.dataset.delta);

                    let currentSec = getRawValue(field);
                    let newSec = currentSec + delta;

                    if (field === "work" && newSec < 5) newSec = 5;
                    if (field !== "work" && newSec < 0) newSec = 0;
                    if (newSec > 3600) newSec = 3600;

                    setRawValue(field, newSec);
                    updateSummary();
                });
            });

            // ── Audio Engine ──
            let audioCtx = null;
            function getAudioCtx() {
                if (!audioCtx)
                    audioCtx = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                return audioCtx;
            }

            function playBeep(frequency, duration) {
                try {
                    const ctx = getAudioCtx();
                    if (ctx.state === "suspended") ctx.resume();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.type = "sine";
                    osc.frequency.value = frequency;
                    const now = ctx.currentTime;

                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.8, now + 0.005);
                    gainNode.gain.setValueAtTime(0.8, now + duration - 0.01);
                    gainNode.gain.linearRampToValueAtTime(0, now + duration);

                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + duration);
                } catch (e) {
                    console.error(e);
                }
            }

            function playLowBeep() {
                playBeep(900, 0.25);
            }
            function playHighBeep() {
                playBeep(2300, 0.7);
            }
            function playWarning() {
                playBeep(1200, 0.08);
                setTimeout(() => playBeep(1200, 0.08), 150);
            }

            // ── Wake Lock ──
            let wakeLock = null;
            async function acquireWakeLock() {
                if ("wakeLock" in navigator) {
                    try {
                        wakeLock = await navigator.wakeLock.request("screen");
                    } catch {}
                }
            }
            function releaseWakeLock() {
                if (wakeLock) {
                    wakeLock.release();
                    wakeLock = null;
                }
            }

            // ── Motore Sequenza Timer ──
            let state = null;
            let interval = null;

            function buildSequence() {
                const prepare = getRawValue("prepare");
                const rest = getRawValue("rest");
                const warning =
                    parseInt(document.getElementById("cfg-warning").value) || 0;

                const seq = [];
                if (prepare > 0)
                    seq.push({
                        phase: "prepare",
                        duration: prepare,
                        round: null,
                        warning: 0,
                    });

                roundTimes.forEach((workDuration, index) => {
                    const rNumber = index + 1;
                    seq.push({
                        phase: "work",
                        duration: workDuration,
                        round: rNumber,
                        warning: warning,
                    });
                    if (rNumber < roundTimes.length && rest > 0) {
                        seq.push({
                            phase: "rest",
                            duration: rest,
                            round: rNumber,
                            warning: 0,
                        });
                    }
                });
                return seq;
            }

            function startTimer() {
                getAudioCtx();
                const seq = buildSequence();

                state = {
                    seq,
                    idx: 0,
                    remaining: seq[0].duration,
                    paused: false,
                    warningFired: false,
                    beepsFired: new Set(),
                    lastTick: performance.now(),
                    totalRounds: roundTimes.length,
                };

                showActive();
                acquireWakeLock();
                renderActive();
                onPhaseStart();

                interval = setInterval(tick, 50);
            }

            function onPhaseStart() {
                state.warningFired = false;
                state.beepsFired = new Set();
                playHighBeep();
            }

            function tick() {
                if (state.paused) return;

                const now = performance.now();
                const delta = (now - state.lastTick) / 1000;
                state.lastTick = now;

                state.remaining -= delta;
                const seg = state.seq[state.idx];
                const currentSecCeil = Math.max(0, Math.ceil(state.remaining));

                if (
                    seg.phase === "work" &&
                    !state.warningFired &&
                    seg.warning > 0
                ) {
                    if (state.remaining <= seg.warning) {
                        state.warningFired = true;
                        playWarning();
                    }
                }

                if (currentSecCeil <= 3 && currentSecCeil >= 1) {
                    if (!state.beepsFired.has(currentSecCeil)) {
                        state.beepsFired.add(currentSecCeil);
                        playLowBeep();
                    }
                }

                if (state.remaining <= 0) {
                    advancePhase();
                    return;
                }

                renderActive();
            }

            function advancePhase() {
                state.idx++;
                if (state.idx >= state.seq.length) {
                    finish();
                    return;
                }

                const next = state.seq[state.idx];
                state.remaining = next.duration;
                state.warningFired = false;
                state.beepsFired = new Set();
                state.lastTick = performance.now();

                renderActive();
                onPhaseStart();
            }

            function finish() {
                clearInterval(interval);
                releaseWakeLock();
                playHighBeep();
                setTimeout(playHighBeep, 400);

                document.getElementById("finished-msg").textContent =
                    `${state.totalRounds} round completati!`;
                document
                    .getElementById("finished-overlay")
                    .classList.add("visible");
            }

            function renderActive() {
                const seg = state.seq[state.idx];
                const rem = Math.max(0, Math.ceil(state.remaining));
                const isWarning =
                    seg.phase === "work" &&
                    seg.warning > 0 &&
                    rem <= seg.warning;
                const displayPhase = isWarning ? "warning" : seg.phase;

                const badge = document.getElementById("phase-badge");
                badge.className = "phase-badge " + displayPhase;
                badge.textContent = {
                    prepare: "PREPARE",
                    work: "WORK",
                    rest: "REST",
                    warning: "WARNING",
                }[displayPhase];

                const roundNum = document.getElementById("round-num");
                const roundLabel = document.getElementById("round-label");
                const totalRoundsText = state.totalRounds;

                if (seg.phase === "prepare") {
                    roundNum.textContent = "—";
                    roundLabel.textContent = `${totalRoundsText} round`;
                    document.getElementById("time-label").textContent =
                        "prepare";
                } else {
                    roundNum.textContent = seg.round;
                    roundLabel.textContent = `/ ${totalRoundsText} round`;
                    document.getElementById("time-label").textContent =
                        seg.phase === "rest" ? "rest" : "lavoro";
                }

                document.getElementById("time-val").textContent =
                    formatSecondsToMMSS(rem);
                const pct = (state.remaining / seg.duration) * 100;
                document.getElementById("progress-bar").style.width =
                    Math.max(0, pct) + "%";
                document.body.className = "phase-" + displayPhase;
            }

            function showActive() {
                document.getElementById("setup-screen").style.display = "none";
                document
                    .getElementById("active-screen")
                    .classList.add("visible");
            }

            function showSetup() {
                document.getElementById("setup-screen").style.display = "";
                document
                    .getElementById("active-screen")
                    .classList.remove("visible");
                document.body.className = "";
                document
                    .getElementById("finished-overlay")
                    .classList.remove("visible");
            }

            document
                .getElementById("btn-start")
                .addEventListener("click", startTimer);
            document
                .getElementById("btn-pause")
                .addEventListener("click", () => {
                    if (!state) return;
                    state.paused = !state.paused;
                    if (!state.paused) state.lastTick = performance.now();
                    document.getElementById("btn-pause").textContent =
                        state.paused ? "▶ Riprendi" : "⏸ Pausa";
                });
            document
                .getElementById("btn-stop")
                .addEventListener("click", () => {
                    clearInterval(interval);
                    releaseWakeLock();
                    state = null;
                    showSetup();
                });
            document
                .getElementById("btn-done")
                .addEventListener("click", () => {
                    clearInterval(interval);
                    releaseWakeLock();
                    state = null;
                    showSetup();
                });

            // Avvio iniziale
            loadConfig();
        </script>
    </body>
</html>
